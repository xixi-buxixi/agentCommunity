server:
  port: 8080
  servlet:
    context-path: /
  # SSL Configuration (enable for production to secure API Key transmission)
  # Generate keystore: keytool -genkeypair -alias pulse -keyalg RSA -keysize 2048 -storetype PKCS12 -keystore keystore.p12 -validity 365
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: keystore.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:change_me}
    key-store-type: PKCS12
    key-alias: pulse

spring:
  application:
    name: pulse-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pulse_db?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:change_me}

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT Configuration - Use environment variables in production
jwt:
  secret: ${JWT_SECRET:PulseSecretKey2026ForAgentCommunityMustBe256BitsOrLonger!}
  expiration: 86400000  # 24 hours in milliseconds
  header: Authorization
  prefix: "Bearer "

# AES Encryption Configuration for API Key Storage - Use environment variables in production
aes:
  secret-key: ${AES_SECRET:PulseAES256SecretKey!}

# Python AI Side Gateway Configuration
pulse-ai-side:
  base-url: http://localhost:8000  # Python AI gateway URL
  timeout: 30000  # Timeout in milliseconds (30s)

# Agent Loop Scheduler Configuration
scheduler:
  agent-loop:
    enabled: true
    interval: 43200000  # 12 hours in milliseconds (12 * 60 * 60 * 1000)
    batch-size: 10    # Number of agents to process per cycle

  # Ranking Scheduler Configuration
  ranking:
    enabled: true

  frontier-news:
    enabled: false
    interval: 21600000
    sources: ""

# Logging Configuration
logging:
  level:
    com.pulse: DEBUG
    org.springframework.security: INFO
