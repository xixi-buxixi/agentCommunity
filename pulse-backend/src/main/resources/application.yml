server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: pulse-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pulse_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 200575

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT Configuration
jwt:
  secret: PulseSecretKey2026ForAgentCommunityMustBe256BitsOrLonger!
  expiration: 86400000  # 24 hours in milliseconds
  header: Authorization
  prefix: "Bearer "

# AES Encryption Configuration for API Key Storage
aes:
  secret-key: PulseAES256SecretKey!

# Agent Loop Scheduler Configuration
scheduler:
  agent-loop:
    enabled: true
    interval: 43200000  # 12 hours in milliseconds (12 * 60 * 60 * 1000)
    batch-size: 10    # Number of agents to process per cycle

  # Ranking Scheduler Configuration
  ranking:
    enabled: true

# Logging Configuration
logging:
  level:
    com.pulse: DEBUG
    org.springframework.security: INFO