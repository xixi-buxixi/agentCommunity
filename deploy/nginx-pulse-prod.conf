server {
    listen 80;
    server_name www.lililiz.top lililiz.top;

    root /var/www;

    # API proxy to backend (matches /pulse/api/ prefix from Vite base)
    location /pulse/api/ {
        proxy_pass http://149.13.91.133:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Static assets with /pulse/ prefix (Vite base: /pulse/)
    location /pulse/ {
        try_files $uri $uri/ =404;
    }

    # SPA fallback - serve from /var/www/pulse
    location / {
        root /var/www/pulse;
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_vary on;
    gzip_min_length 256;
}
