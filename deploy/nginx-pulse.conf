# Pulse Frontend Nginx Configuration
# Deploy to: /etc/nginx/sites-available/pulse
# Then: ln -s /etc/nginx/sites-available/pulse /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name www.lililiz.top lililiz.top;

    root /var/www/pulse;
    index index.html;

    # SPA fallback: all non-file requests go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to backend (Qiniuyun server)
    location /pulse/api/ {
        proxy_pass http://QINIUYUN_IP:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Gzip compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_vary on;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
